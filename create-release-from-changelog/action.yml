name: Create GitHub Release from Changelog
description: Create a GitHub release from a changelog file using "keep a changelog" format
inputs:
  changelog_file:
    description: 'The input path of the changelog file. Default: `CHANGELOG.md`'
    required: false
    default: 'CHANGELOG.md'
  release_notes_file:
    description: 'The output path of the release notes file (optional).'
    required: false
  prerelease:
    description: '`true` to get release notes from the `[Unreleased]` section. `false` to get release notes for the latest release. Default: `false`'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Extract Release Notes
      id: extract_release_notes
      uses: ffurrer2/extract-release-notes@273da39a24fb7db106a35526c8162815faffd31d # v3.1.0
      with:
        changelog_file: ${{ inputs.changelog_file }}
        release_notes_file: ${{ inputs.release_notes_file }}
        prerelease: ${{ inputs.prerelease }}
    - name: Create GitHub Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        body: ${{ steps.extract_release_notes.outputs.release_notes }}
        name: Release ${{ github.ref_name }}
        generate_release_notes: false
