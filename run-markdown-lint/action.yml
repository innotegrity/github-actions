name: Run markdownlint
description: Run markdownlint to lint Markdown files
inputs:
  fix:
    description: Whether to fix supported issues automatically (any truthy value enables)
    default: ''
    required: false
  globs:
    description: Glob expression(s) of files to lint (newline-delimited)
    default: '*.{md,mdc}'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Run markdownlint checks
      uses: DavidAnson/markdownlint-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 #v23.0.0
      with:
        fix: ${{ inputs.fix }}
        globs: ${{ inputs.globs }}
