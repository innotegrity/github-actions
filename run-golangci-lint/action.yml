name: Run golangci-lint
description: Run golangci-lint to lint Go code
inputs:
  version:
    description: The version of golangci-lint to use
    required: false
    default: 'v2.11.4'

runs:
  using: 'composite'
  steps:
    - name: Run golangci-lint checks
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # 9.2.0
      with:
        version: ${{ inputs.version }}
