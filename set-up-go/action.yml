name: Set up Golang
description: Install Go and set up the Go environment
inputs:
  version:
    description: The version of Go to install
    required: false
    default: '1.25.9'

runs:
  using: 'composite'
  steps:
    - name: Set up Golang
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.version }}
